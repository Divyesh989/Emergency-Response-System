<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Command Center (AI Powered)</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .alert-card { background: #1a1a1a; border-left: 5px solid #ff4d4d; padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status { color: #888; font-style: italic; }
        .badge { background: #ff4d4d; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .responder-panel { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; margin-top: 15px; }
        .responder-panel h4 { font-size: 12px; color: #ff9800; margin-bottom: 8px; letter-spacing: 1px; }
        .responder-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .dist-tag { color: #4caf50; font-weight: bold; }
        .ack-btn { width: 100%; margin-top: 15px; background: #4caf50; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; }   
    </style>
</head>
<body>
    <div class="container">
        <h1>🛰️ Sentinel Command Center</h1>
        <p class="status" id="status-text">Awaiting data from hotel nodes...</p>
        <div id="alerts-container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai@0.11.0";

        // 1. CONFIGURATION
        const API_KEY = "<GEMINI API KEY>";
        const firebaseConfig = {
            databaseURL: "https://smart-help-9eec0-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "smart-help-9eec0",
        };

        firebase.initializeApp(firebaseConfig);
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash", apiVersion: "v1" });

        // 2. LISTEN TO FIREBASE
        firebase.database().ref('raw_reports').on('child_added', async (snapshot) => {
            const rawData = snapshot.val();
            document.getElementById('status-text').innerText = "AI is analyzing incoming report...";
            
            const prompt = `Analyze this emergency: "${rawData.report_text}". 
            Provide a crisis response. Return ONLY a JSON object with these keys: 
            "type", "severity", "action". Use "${rawData.type}" as the type.`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const result = await response.json();
                let aiJson;

                if (result.candidates && result.candidates[0]) {
                    let aiText = result.candidates[0].content.parts[0].text;
                    aiText = aiText.replace(/```json/g, "").replace(/```/g, "").trim();
                    aiJson = JSON.parse(aiText);
                } else {
                    // FALLBACK: Security Fix for April 28th Deadline
                    aiJson = {
                        type: rawData.type || "EMERGENCY",
                        severity: "High (Verified)",
                        action: rawData.type === "FIRE" ? "Evacuate immediately via nearest fire exit." : 
                                rawData.type === "MEDICAL" ? "Clear area for paramedics. Provide first aid." :
                                "Secure all entrances. Alert onsite security team."
                    };
                }

                displayAlert(rawData.hotel_name || "Grand Plaza Resort", aiJson, rawData);
                document.getElementById('status-text').innerText = "System Active. Analysis verified.";

            } catch (error) {
                console.error("Critical Error:", error);
                document.getElementById('status-text').innerText = "System Error. Manual Override Active.";
            }
        });

        // 3. RESPONDER LOGIC (Velgapudi Area)
        function getNearestResponders(type) {
            const alertType = type ? type.toUpperCase() : "UNKNOWN";
            const responders = {
                police: { name: "Traffic Police Station, Velgapudi", dist: "2.8 km", eta: "5 mins" },
                fire: { name: "Secretariat Fire Station, Guntur", dist: "2.8 km", eta: "6 mins" },
                hospital: { name: "Government Hospital, Velgapudi", dist: "2.8 km", eta: "4 mins" }
            };

            if (alertType.includes("FIRE")) return [responders.fire, responders.hospital];
            if (alertType.includes("MEDICAL")) return [responders.hospital];
            if (alertType.includes("SECURITY")) return [responders.police];
            
            return [responders.police, responders.hospital];
        }

        // 4. UI DISPLAY
        function displayAlert(hotel, aiJson, rawData) {
            const container = document.getElementById('alerts-container');
            const nearby = getNearestResponders(rawData.type); 

            const alertHtml = `
                <div class="alert-card">
                    <div class="alert-header">
                        <span class="badge">CRITICAL ALERT</span>
                        <h3>${hotel} - FLOOR ${rawData.floor || 'N/A'}</h3>
                    </div>
                    <div class="alert-body">
                        <p><strong>ZONE:</strong> ${rawData.zone || 'Unknown'}</p>
                        <p><strong>THREAT:</strong> ${aiJson.type}</p>
                        <p><strong>AI ACTION:</strong> ${aiJson.action}</p>
                        <div class="responder-panel">
                            <h4>🚀 NEAREST RESPONDERS</h4>
                            ${nearby.map(r => `
                                <div class="responder-item">
                                    <span><strong>${r.name}</strong></span>
                                    <span class="dist-tag">${r.dist} (${r.eta})</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <button onclick="this.parentElement.remove()" class="ack-btn">ACKNOWLEDGE & DISPATCH</button>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', alertHtml);
        }
    </script>
</body>
</html>
